name: Lead Engine Comprehensive CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Backend Lint (Ruff)
      run: |
        pip install ruff
        ruff check .
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: './templates/package-lock.json'
        
    - name: Install Frontend Deps
      working-directory: ./templates
      run: npm install
      
    - name: Frontend Lint & Typecheck
      working-directory: ./templates
      run: |
        npm run lint
        # npx tsc --noEmit (optional, based on project strictness)

  backend-unit-tests:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install msgspec
        # Install patchright browser and its system dependencies
        python -m patchright install --with-deps chromium
        
    - name: Verify Environment
      run: |
        node --version
        python --version
        python -c "import patchright; print('patchright imported successfully')"
        python -c "import msgspec; print('msgspec imported successfully')"
        python -c "import scrapling; print('scrapling imported successfully')"
        pip list | grep -E "patchright|scrapling|msgspec"
        
    - name: Run Core Logic Tests
      env:
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_core_logic.py
        
    - name: Run API Worker Tests
      env:
        PYTHONPATH: .
      run: |
        python -m pytest tests/test_api_worker.py

  frontend-build:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: './templates/package-lock.json'
        
    - name: Build Next.js
      working-directory: ./templates
      run: |
        npm install
        npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  docker-verify:
    needs: [backend-unit-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t lead-engine-backend .
